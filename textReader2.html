<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Robust Cinematic Reader</title>
        
    </head>
    
    <style>
        @import url('https://fonts.googleapis.com');
    
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; 
            overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        
        #viewport { width: 90%; max-width: 1000px; height: 300px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .sentence { position: absolute; width: 100%; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; text-align: center; font-size: 3rem; font-weight: 300; line-height: 1.3; }
        .sentence.active { opacity: 1; pointer-events: auto; }
        .word { cursor: pointer; transition: 0.2s; padding: 0 4px; display: inline-block; border-radius: 4px; }
        .word:hover { color: #00ffcc; }
    
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.3); display: none; z-index: 500; 
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        
        #menu { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(83, 79, 79, 0.85); opacity:0.9;border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 40px 30px; border-radius: 32px; width: 280px; text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
    
        #m-word { margin: 0 0 25px 0; font-size: 2.4rem; font-weight: 700; color: #76fcfe; cursor: pointer; }
        #m-word:hover { color: #00ffcc; }
    
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .menu-btn { width: 100%; padding: 11px; background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50px; cursor: pointer; font-weight: 500; text-decoration: none; box-sizing: border-box; transition: 0.3s; font-size: 0.85rem; }
        .menu-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .save-btn { background: #fff; color: #000; border: none; }
        .save-btn:hover { background: #00ffcc; }
        
        .close-btn { background: #444; color: #fff; border: none; margin-top: 30px; padding: 10px 24px; border-radius: 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .close-btn:hover { background: #ff4444; }
        
        #controls { position: fixed; bottom: 50px; display: flex; gap: 60px; z-index: 100; }
        .ctrl-btn { font-size: 0.6rem; letter-spacing: 4px; color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; font-weight: 700; }
        .ctrl-btn:hover { color: #fff; }
        
        #speed-box { position: fixed; bottom: 100px; opacity: 0; transition: 0.5s; text-align: center; }
        #controls:hover ~ #speed-box, #speed-box:hover { opacity: 1; }
        #wpm-display { font-size: 0.7rem; color: #00ffcc; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
        input[type=range] { width: 160px; accent-color: #00ffcc; cursor: pointer; }
        </style>
        <script src="readingText.js"></script>
<body>

    <div id="viewport" onmouseenter="pauseMovie()" onmouseleave="resumeMovie()"></div>

    <div id="modal-overlay">
        <div id="menu">
            <h2 id="m-word" onclick="speakActive()">Word</h2>
            <div class="btn-stack">
                <button class="menu-btn save-btn" onclick="saveWord()">SAVE TO COLLECTION</button>
                <a id="g-link" class="menu-btn" target="_blank" style="text-decoration: none;">GOOGLE SEARCH</a>
            </div>
            <button class="close-btn" onclick="closeMenu()">Dismiss</button>
        </div>
    </div>

    <div id="controls">
        <span class="ctrl-btn" onclick="move(-1)">PREV</span>
        <span class="ctrl-btn" id="play-toggle" onclick="toggle()">PLAY</span>
        <span class="ctrl-btn" onclick="move(1)">NEXT</span>
    </div>

    <div id="speed-box">
        <div id="wpm-display"><span id="wpm-val">250</span> WPM</div>
        <input type="range" id="wpm" min="100" max="800" step="10" value="250" oninput="updateWPM()">
    </div>

    <script>
        // INPUT TEXT HERE
         const essayText = localStorage.getItem('readingText') || ['not found'];

        function processText(input) {
            let workingText = input;
            // 1. Temporarily replace abbreviations with placeholders to prevent splitting
            const abbrevMap = { "Mr.": "##MR##", "Mrs.": "##MRS##", "Dr.": "##DR##", "Ms.": "##MS##", "St.": "##ST##" };
            for (let key in abbrevMap) {
                workingText = workingText.split(key).join(abbrevMap[key]);
            }

            // 2. Handle initials (e.g., J. Rooney) - find any capital letter followed by a dot
            workingText = workingText.replace(/([A-Z])\.\s/g, "$1##DOT## ");

            // 3. Split by sentence enders
            const rawSentences = workingText.split(/[\.\!\?]\s+/);
            const finalLines = [];

            rawSentences.forEach(s => {
                if (!s.trim()) return;
                
                // Restore placeholders
                let sentence = s;
                for (let key in abbrevMap) {
                    sentence = sentence.split(abbrevMap[key]).join(key);
                }
                sentence = sentence.split("##DOT##").join(".");

                // 4. Split long sentences by word count (max 10 words for high readability)
                const max=12;
                const words = sentence.trim().split(' ');
                for (let i = 0; i < words.length; i += max) {
                    finalLines.push(words.slice(i, i + max).join(' '));
                }
            });

            return finalLines;
        }

        const displayLines = processText(essayText);
        let idx = 0, playing = false, timer = null, wasPlaying = false, activeW = "", isMenuOpen = false;
        const vp = document.getElementById('viewport');
        
        displayLines.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'sentence'; div.id = `l-${i}`;
            s.split(' ').forEach(w => {
                const span = document.createElement('span');
                span.className = 'word'; span.innerText = w + ' ';
                span.onclick = (e) => { e.stopPropagation(); openMenu(w.replace(/[.,!?]/g, '')); };
                div.appendChild(span);
            });
            vp.appendChild(div);
        });

        // Add "The End"
        const endDiv = document.createElement('div');
        endDiv.className = 'sentence'; endDiv.id = `l-${displayLines.length}`;
        endDiv.innerHTML = '<span style="color:#00ffcc; font-weight:700">The End</span>';
        vp.appendChild(endDiv);

        function show(i) {
            document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active'));
            idx = Math.max(0, Math.min(i, displayLines.length));
            const el = document.getElementById(`l-${idx}`);
            if (el) el.classList.add('active');

            if (idx === displayLines.length) {
                playing = false;
                document.getElementById('play-toggle').innerText = "PLAY";
                clearTimeout(timer);
            }
        }

        function move(step) { 
           //  toggleFullScreen();
            show(idx + step); if(playing) run(); 
        }
        function toggle() {
            if (idx === displayLines.length) idx = -1;
            playing = !playing;
            document.getElementById('play-toggle').innerText = playing ? "PAUSE" : "PLAY";
            if (playing) run(); else clearTimeout(timer);
        }

        function speakActive() {
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(activeW));
        }

        function openMenu(w) {
            clearTimeout(timer); playing = false; isMenuOpen = true; activeW = w;
            document.getElementById('play-toggle').innerText = "PLAY";
            speakActive();
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('m-word').innerText = w;
            document.getElementById('g-link').href = `https://www.google.com{w}`;
        }

        function saveWord() {
            const list = JSON.parse(localStorage.getItem('vocab_list') || '[]');
            if(!list.includes(activeW)) { list.push(activeW); localStorage.setItem('vocab_list', JSON.stringify(list)); }
            closeMenu();
        }

        function closeMenu() { document.getElementById('modal-overlay').style.display = 'none'; isMenuOpen = false; }
        function updateWPM() { document.getElementById('wpm-val').innerText = document.getElementById('wpm').value; if(playing) run(); }

        function run() {
            clearTimeout(timer);
            if (idx >= displayLines.length) return;
            const delay = (displayLines[idx].split(' ').length / document.getElementById('wpm').value) * 60000;
            timer = setTimeout(() => { show(idx + 1); if(idx < displayLines.length) run(); }, delay);
        }

        function pauseMovie() { if(playing && !isMenuOpen) { wasPlaying = true; clearTimeout(timer); } }
        function resumeMovie() { if(wasPlaying && !isMenuOpen) { wasPlaying = false; run(); } }

        window.addEventListener('keydown', (e) => {
            if (isMenuOpen) { if (e.code === 'Escape') closeMenu(); return; }
            if (e.code === 'Space') { e.preventDefault(); toggle(); }
            if (e.code === 'ArrowRight') move(1);
            if (e.code === 'ArrowLeft') move(-1);
        });

        show(0);

                function toggleFullScreen() {
  if (!document.fullscreenElement &&    // alternative standard method
      !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement ) {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    } else if (document.documentElement.msRequestFullscreen) {
      document.documentElement.msRequestFullscreen();
    } else if (document.documentElement.mozRequestFullScreen) {
      document.documentElement.mozRequestFullScreen();
    } else if (document.documentElement.webkitRequestFullscreen) {
      document.documentElement.webkitRequestFullscreen();
    }
  } 
//   else {
//     if (document.exitFullscreen) {
//       document.exitFullscreen();
//     } else if (document.msExitFullscreen) {
//       document.msExitFullscreen();
//     } else if (document.mozCancelFullScreen) {
//       document.mozCancelFullScreen();
//     } else if (document.webkitExitFullscreen) {
//       document.webkitExitFullscreen();
//     }
//   }
}
    </script>
</body>
</html>
